<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Graebener Webbuilder — gallery of AI-generated sites">
  <defs>
    <pattern id="wb-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <filter id="wb-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#wb-grid)"/>

  <!-- top-left bracket marker -->
  <path d="M40 40 L40 80 M40 40 L80 40" stroke="#ff6b47" stroke-width="2" fill="none"/>
  <!-- bottom-right bracket marker -->
  <path d="M1160 590 L1160 550 M1160 590 L1120 590" stroke="#ff6b47" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- header -->
  <text x="60" y="60" font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="20" fill="#ff6b47" letter-spacing="1.5">$ webbuilder.generate</text>
  <text x="60" y="92" font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="13" fill="#f0f0fa" opacity="0.45" letter-spacing="2">prompt → ai → site → gallery</text>

  <!-- live status pill, top-right -->
  <g transform="translate(1010,46)">
    <rect width="150" height="28" rx="14" fill="#161616" stroke="#252525"/>
    <circle cx="16" cy="14" r="4" fill="#7fc97f"/>
    <circle cx="16" cy="14" r="4" fill="#7fc97f" filter="url(#wb-glow)" opacity="0.7"/>
    <text x="30" y="18" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#f0f0fa" opacity="0.7" letter-spacing="1.5">building · 30+ sites</text>
  </g>

  <!-- 3 × 2 GRID OF GENERATED SITE CARDS -->

  <!-- CARD 1 — hero / restaurant -->
  <g transform="translate(60,140)">
    <rect width="340" height="210" rx="8" fill="#141414" stroke="#252525"/>
    <rect width="340" height="28" rx="8" fill="#1c1c1c"/>
    <rect y="20" width="340" height="8" fill="#1c1c1c"/>
    <circle cx="14" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="28" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="42" cy="14" r="4" fill="#2e2e2e"/>
    <rect x="200" y="10" width="120" height="8" rx="4" fill="#222"/>
    <!-- hero image area -->
    <rect x="16" y="44" width="308" height="100" rx="4" fill="#1f1f1f"/>
    <path d="M16 144 L120 90 L200 120 L324 70 L324 144 Z" fill="#262626"/>
    <circle cx="270" cy="78" r="10" fill="#2e2e2e"/>
    <!-- text lines -->
    <rect x="16" y="158" width="200" height="10" rx="2" fill="#2a2a2a"/>
    <rect x="16" y="174" width="140" height="6" rx="2" fill="#1f1f1f"/>
    <rect x="16" y="186" width="80" height="14" rx="3" fill="#252525"/>
  </g>

  <!-- CARD 2 — HIGHLIGHTED, gallery -->
  <g transform="translate(430,140)">
    <rect x="-3" y="-3" width="346" height="216" rx="11" fill="none" stroke="#ff6b47" stroke-width="1.5" opacity="0.85"/>
    <rect x="-6" y="-6" width="352" height="222" rx="14" fill="none" stroke="#ff6b47" stroke-width="0.5" opacity="0.35"/>
    <rect width="340" height="210" rx="8" fill="#161616" stroke="#2a2a2a"/>
    <rect width="340" height="28" rx="8" fill="#1c1c1c"/>
    <rect y="20" width="340" height="8" fill="#1c1c1c"/>
    <circle cx="14" cy="14" r="4" fill="#ff6b47"/>
    <circle cx="28" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="42" cy="14" r="4" fill="#2e2e2e"/>
    <rect x="200" y="10" width="120" height="8" rx="4" fill="#262626"/>
    <!-- 3-up gallery -->
    <rect x="16" y="44" width="100" height="80" rx="4" fill="#202020"/>
    <rect x="120" y="44" width="100" height="80" rx="4" fill="#1d1d1d"/>
    <rect x="224" y="44" width="100" height="80" rx="4" fill="#202020"/>
    <rect x="16" y="128" width="100" height="40" rx="4" fill="#1c1c1c"/>
    <rect x="120" y="128" width="100" height="40" rx="4" fill="#1f1f1f"/>
    <rect x="224" y="128" width="100" height="40" rx="4" fill="#1c1c1c"/>
    <!-- caption -->
    <text x="16" y="190" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#ff6b47" letter-spacing="1">just generated ⏎</text>
  </g>

  <!-- CARD 3 — long-form / blog -->
  <g transform="translate(800,140)">
    <rect width="340" height="210" rx="8" fill="#141414" stroke="#252525"/>
    <rect width="340" height="28" rx="8" fill="#1c1c1c"/>
    <rect y="20" width="340" height="8" fill="#1c1c1c"/>
    <circle cx="14" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="28" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="42" cy="14" r="4" fill="#2e2e2e"/>
    <rect x="200" y="10" width="120" height="8" rx="4" fill="#222"/>
    <!-- big headline -->
    <rect x="16" y="48" width="240" height="14" rx="2" fill="#2a2a2a"/>
    <rect x="16" y="68" width="180" height="10" rx="2" fill="#222"/>
    <!-- columns of body -->
    <rect x="16" y="92" width="140" height="6" rx="2" fill="#1f1f1f"/>
    <rect x="16" y="104" width="140" height="6" rx="2" fill="#1f1f1f"/>
    <rect x="16" y="116" width="140" height="6" rx="2" fill="#1f1f1f"/>
    <rect x="16" y="128" width="100" height="6" rx="2" fill="#1f1f1f"/>
    <rect x="170" y="92" width="154" height="80" rx="4" fill="#1c1c1c"/>
    <rect x="16" y="180" width="60" height="14" rx="3" fill="#252525"/>
  </g>

  <!-- CARD 4 — list / menu -->
  <g transform="translate(60,380)">
    <rect width="340" height="210" rx="8" fill="#141414" stroke="#252525"/>
    <rect width="340" height="28" rx="8" fill="#1c1c1c"/>
    <rect y="20" width="340" height="8" fill="#1c1c1c"/>
    <circle cx="14" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="28" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="42" cy="14" r="4" fill="#2e2e2e"/>
    <rect x="200" y="10" width="120" height="8" rx="4" fill="#222"/>
    <!-- title -->
    <rect x="16" y="48" width="120" height="12" rx="2" fill="#2a2a2a"/>
    <!-- list rows -->
    <g>
      <rect x="16" y="74" width="308" height="22" rx="3" fill="#181818"/>
      <rect x="22" y="83" width="160" height="6" rx="2" fill="#262626"/>
      <rect x="288" y="83" width="30" height="6" rx="2" fill="#ff6b47" opacity="0.5"/>
    </g>
    <g>
      <rect x="16" y="100" width="308" height="22" rx="3" fill="#181818"/>
      <rect x="22" y="109" width="200" height="6" rx="2" fill="#262626"/>
      <rect x="288" y="109" width="30" height="6" rx="2" fill="#262626"/>
    </g>
    <g>
      <rect x="16" y="126" width="308" height="22" rx="3" fill="#181818"/>
      <rect x="22" y="135" width="140" height="6" rx="2" fill="#262626"/>
      <rect x="288" y="135" width="30" height="6" rx="2" fill="#262626"/>
    </g>
    <g>
      <rect x="16" y="152" width="308" height="22" rx="3" fill="#181818"/>
      <rect x="22" y="161" width="180" height="6" rx="2" fill="#262626"/>
      <rect x="288" y="161" width="30" height="6" rx="2" fill="#262626"/>
    </g>
    <rect x="16" y="184" width="80" height="14" rx="3" fill="#252525"/>
  </g>

  <!-- CARD 5 — form / contact -->
  <g transform="translate(430,380)">
    <rect width="340" height="210" rx="8" fill="#141414" stroke="#252525"/>
    <rect width="340" height="28" rx="8" fill="#1c1c1c"/>
    <rect y="20" width="340" height="8" fill="#1c1c1c"/>
    <circle cx="14" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="28" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="42" cy="14" r="4" fill="#2e2e2e"/>
    <rect x="200" y="10" width="120" height="8" rx="4" fill="#222"/>
    <!-- title -->
    <rect x="16" y="48" width="180" height="12" rx="2" fill="#2a2a2a"/>
    <rect x="16" y="68" width="100" height="6" rx="2" fill="#1f1f1f"/>
    <!-- input fields -->
    <rect x="16" y="86" width="308" height="26" rx="4" fill="#1a1a1a" stroke="#222"/>
    <rect x="22" y="96" width="80" height="6" rx="2" fill="#2a2a2a"/>
    <rect x="16" y="120" width="308" height="26" rx="4" fill="#1a1a1a" stroke="#222"/>
    <rect x="22" y="130" width="120" height="6" rx="2" fill="#2a2a2a"/>
    <rect x="16" y="154" width="308" height="40" rx="4" fill="#181818" stroke="#222"/>
    <!-- submit -->
    <rect x="244" y="74" width="80" height="20" rx="3" fill="#ff6b47" opacity="0.85"/>
  </g>

  <!-- CARD 6 — dashboard / stats -->
  <g transform="translate(800,380)">
    <rect width="340" height="210" rx="8" fill="#141414" stroke="#252525"/>
    <rect width="340" height="28" rx="8" fill="#1c1c1c"/>
    <rect y="20" width="340" height="8" fill="#1c1c1c"/>
    <circle cx="14" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="28" cy="14" r="4" fill="#2e2e2e"/>
    <circle cx="42" cy="14" r="4" fill="#2e2e2e"/>
    <rect x="200" y="10" width="120" height="8" rx="4" fill="#222"/>
    <!-- 3 stat tiles -->
    <rect x="16" y="44" width="98" height="50" rx="4" fill="#191919"/>
    <rect x="22" y="52" width="40" height="14" rx="2" fill="#2a2a2a"/>
    <rect x="22" y="72" width="60" height="6" rx="2" fill="#1f1f1f"/>
    <rect x="120" y="44" width="98" height="50" rx="4" fill="#191919"/>
    <rect x="126" y="52" width="40" height="14" rx="2" fill="#2a2a2a"/>
    <rect x="126" y="72" width="60" height="6" rx="2" fill="#1f1f1f"/>
    <rect x="224" y="44" width="100" height="50" rx="4" fill="#191919"/>
    <rect x="230" y="52" width="40" height="14" rx="2" fill="#ff6b47" opacity="0.55"/>
    <rect x="230" y="72" width="60" height="6" rx="2" fill="#1f1f1f"/>
    <!-- chart -->
    <rect x="16" y="104" width="308" height="74" rx="4" fill="#181818"/>
    <polyline points="22,160 60,140 100,150 140,120 180,130 220,100 260,110 310,80" fill="none" stroke="#ff6b47" stroke-width="1.8" opacity="0.85"/>
    <polyline points="22,165 60,158 100,162 140,150 180,156 220,144 260,148 310,132" fill="none" stroke="#f0f0fa" stroke-width="1" opacity="0.25"/>
    <rect x="16" y="184" width="60" height="14" rx="3" fill="#252525"/>
  </g>

  <!-- footer -->
  <text x="60" y="612" font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="13" fill="#f0f0fa" opacity="0.4" letter-spacing="1.5">~/projects/webbuilder · 30+ sites · 0 hand-coded</text>
</svg>
