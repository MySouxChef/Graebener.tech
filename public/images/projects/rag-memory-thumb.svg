<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="RAG Memory find_resource example response">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; fill: #f0f0fa; }
      .muted { fill: rgba(240, 240, 250, 0.55); }
      .dim { fill: rgba(240, 240, 250, 0.35); }
      .accent { fill: #c9c9e8; }
      .score { fill: #9a9abe; }
      .match { fill: rgba(240, 240, 250, 0.75); }
      .prompt { fill: #7a7ab0; }
    </style>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="800" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- dots -->
  <circle cx="44" cy="44" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="66" cy="44" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="88" cy="44" r="6" fill="rgba(255,255,255,0.15)"/>

  <!-- title -->
  <text x="140" y="49" class="mono dim" font-size="16" letter-spacing="3">RAG_MEMORY · MCP DISCOVERY</text>

  <!-- divider -->
  <line x1="32" y1="88" x2="1248" y2="88" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- query -->
  <text x="64" y="160" class="mono prompt" font-size="28">$</text>
  <text x="104" y="160" class="mono" font-size="28">find_resource(</text>
  <text x="104" y="200" class="mono accent" font-size="28">"build a Next.js chat UI with streaming"</text>
  <text x="64" y="240" class="mono" font-size="28">)</text>

  <!-- separator -->
  <line x1="64" y1="290" x2="1216" y2="290" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- result 1 -->
  <text x="64" y="340" class="mono accent" font-size="22">→  Skill("vercel-chat-sdk")</text>
  <text x="1020" y="340" class="mono score" font-size="20">score 0.92</text>
  <text x="104" y="372" class="mono muted" font-size="18">~/.claude/skills/vercel-chat-sdk/SKILL.md</text>
  <text x="104" y="400" class="mono match" font-size="18">matches: chat, Next.js, streaming, multi-platform</text>

  <!-- result 2 -->
  <text x="64" y="456" class="mono accent" font-size="22">→  Skill("vercel-ai-sdk")</text>
  <text x="1020" y="456" class="mono score" font-size="20">score 0.81</text>
  <text x="104" y="488" class="mono muted" font-size="18">~/.claude/skills/vercel-ai-sdk/SKILL.md</text>
  <text x="104" y="516" class="mono match" font-size="18">matches: streaming, LLM, AI SDK, React hooks</text>

  <!-- result 3 -->
  <text x="64" y="572" class="mono accent" font-size="22">→  Agent(subagent_type="vercel:ai-architect")</text>
  <text x="1020" y="572" class="mono score" font-size="20">score 0.74</text>
  <text x="104" y="604" class="mono muted" font-size="18">~/.claude/superpowers/agents/vercel-ai-architect.md</text>

  <!-- footer -->
  <line x1="64" y1="680" x2="1216" y2="680" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="64" y="720" class="mono dim" font-size="16">hybrid retrieval · vector + fts · reciprocal rank fusion</text>
  <text x="920" y="720" class="mono dim" font-size="16">local · offline · sqlite</text>
</svg>
