<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hybrid retrieval: vector search and full-text search merged via Reciprocal Rank Fusion">
  <defs>
    <linearGradient id="bg-hybrid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; fill: #f0f0fa; }
      .muted { fill: rgba(240, 240, 250, 0.55); }
      .dim { fill: rgba(240, 240, 250, 0.35); }
      .accent { fill: #c9c9e8; }
      .panel { fill: rgba(255, 255, 255, 0.03); stroke: rgba(255, 255, 255, 0.10); stroke-width: 1; }
      .strong { fill: rgba(255, 255, 255, 0.05); stroke: rgba(255, 255, 255, 0.18); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1280" height="800" fill="url(#bg-hybrid)"/>

  <text x="64" y="80" class="mono dim" font-size="16" letter-spacing="3">02 · HYBRID RETRIEVAL</text>
  <text x="64" y="130" class="mono" font-size="32">Vector + full-text, fused with RRF</text>

  <!-- query node -->
  <rect x="520" y="200" width="240" height="72" rx="10" class="strong"/>
  <text x="640" y="232" class="mono accent" font-size="18" text-anchor="middle">query</text>
  <text x="640" y="256" class="mono muted" font-size="14" text-anchor="middle">"build a Next.js chat UI"</text>

  <!-- two branches -->
  <path d="M 580 272 L 300 360" stroke="rgba(240,240,250,0.25)" stroke-width="1.5" fill="none"/>
  <path d="M 700 272 L 980 360" stroke="rgba(240,240,250,0.25)" stroke-width="1.5" fill="none"/>

  <rect x="100" y="360" width="400" height="140" rx="12" class="panel"/>
  <text x="124" y="396" class="mono accent" font-size="20">vector search</text>
  <text x="124" y="428" class="mono muted" font-size="16">nomic-embed-text · 768-dim</text>
  <text x="124" y="452" class="mono muted" font-size="16">sqlite-vec · cosine distance</text>
  <text x="124" y="478" class="mono dim" font-size="14">semantic · captures meaning</text>

  <rect x="780" y="360" width="400" height="140" rx="12" class="panel"/>
  <text x="804" y="396" class="mono accent" font-size="20">full-text search</text>
  <text x="804" y="428" class="mono muted" font-size="16">SQLite FTS5 · BM25</text>
  <text x="804" y="452" class="mono muted" font-size="16">tokenised name + description</text>
  <text x="804" y="478" class="mono dim" font-size="14">lexical · captures exact terms</text>

  <!-- merge down -->
  <path d="M 300 500 L 640 580" stroke="rgba(240,240,250,0.25)" stroke-width="1.5" fill="none"/>
  <path d="M 980 500 L 640 580" stroke="rgba(240,240,250,0.25)" stroke-width="1.5" fill="none"/>

  <rect x="460" y="580" width="360" height="84" rx="12" class="strong"/>
  <text x="640" y="616" class="mono accent" font-size="20" text-anchor="middle">Reciprocal Rank Fusion</text>
  <text x="640" y="644" class="mono dim" font-size="14" text-anchor="middle">score = Σ 1 / (k + rank)</text>

  <path d="M 640 664 L 640 704" stroke="rgba(240,240,250,0.25)" stroke-width="1.5" fill="none"/>
  <text x="640" y="734" class="mono muted" font-size="16" text-anchor="middle">ranked results</text>
</svg>
